name: Release Validation

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: Src/Componets/
      - run: npm run lint
        working-directory: Src/Componets/
      - run: npm run typecheck
        working-directory: Src/Componets/
      - run: npm run build
        working-directory: Src/Componets/

