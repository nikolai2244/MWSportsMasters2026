name: Node.js Package

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: Src/Componets/
      - run: npm test
        working-directory: Src/Componets/

  publish-gpr:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com/
      - run: npm ci
        working-directory: Src/Componets/
      - run: npm publish
        working-directory: Src/Componets/
        env:
          NODE_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}
