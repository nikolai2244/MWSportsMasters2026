name: "Deploy Now: Execute Build"

on:
  workflow_call:
    inputs:
      site-url:
        required: true
        type: string
      branch-id:
        required: true
        type: string

env:
  DEPLOYMENT_FOLDER: Src/Componets/dist/

jobs:
  build-project:
    name: build MWSportsMasters2026
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Node assets
        env:
          CI: true
          SITE_URL: ${{ inputs.site-url }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        working-directory: Src/Componets/
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm run build

      - name: Store deployment content
        uses: ionos-deploy-now/artifact-action@v1
        with:
          api-key: ${{ secrets.IONOS_API_KEY }}
          service-host: api-us.ionos.space
          project-id: bad3efe8-2805-46ee-aaef-2405a51c4823
          branch-id: ${{ inputs.branch-id }}
          version: ${{ github.sha }}
          folder: Src/Componets/dist/
          config-file: .deploy-now/MWSportsMasters2026/config.yaml
          action: upload
