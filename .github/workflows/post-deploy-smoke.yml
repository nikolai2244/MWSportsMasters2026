name: Post Deploy Smoke Test

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Deploy Now: Deploy to IONOS"]
    types: [completed]

jobs:
  smoke:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify production routes
        env:
          PROD_URL: https://mayorwardprodsports.com
        run: |
          set -e
          for path in / /leaderboard /about /signup /bets; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL$path")
            echo "$path -> $code"
            if [ "$code" -ne 200 ]; then
              echo "Route check failed for $path"
              exit 1
            fi
          done

      - name: Verify security headers exist
        env:
          PROD_URL: https://mayorwardprodsports.com
        run: |
          set -e
          headers=$(curl -sS -D - -o /dev/null "$PROD_URL/")
          echo "$headers"
          if ! echo "$headers" | grep -iq "x-content-type-options\|strict-transport-security\|content-security-policy\|x-frame-options\|referrer-policy"; then
            echo "Warning: no common hardening header detected on origin response"
            echo "This does not fail deploy, but should be fixed at host/CDN layer."
          fi

      - name: Verify backend health (optional)
        env:
          PROD_API_BASE_URL: ${{ secrets.PROD_API_BASE_URL }}
        run: |
          set -e

          if [ -z "$PROD_API_BASE_URL" ]; then
            echo "Skipping backend check: PROD_API_BASE_URL secret is not set."
            exit 0
          fi

          BASE="${PROD_API_BASE_URL%/}"
          health_code=$(curl -sS -o /tmp/health.json -w "%{http_code}" "$BASE/healthz")
          echo "/healthz -> $health_code"
          cat /tmp/health.json || true

          if [ "$health_code" -ne 200 ]; then
            echo "Backend health check failed"
            exit 1
          fi

      - name: Verify backend picks endpoint (optional)
        env:
          PROD_API_BASE_URL: ${{ secrets.PROD_API_BASE_URL }}
        run: |
          set -e

          if [ -z "$PROD_API_BASE_URL" ]; then
            echo "Skipping picks endpoint check: PROD_API_BASE_URL secret is not set."
            exit 0
          fi

          BASE="${PROD_API_BASE_URL%/}"
          picks_code=$(curl -sS -o /tmp/picks.json -w "%{http_code}" "$BASE/api/picks")
          echo "/api/picks -> $picks_code"
          head -c 500 /tmp/picks.json || true
          echo

          # 200 means API + DB ready, 503 means API up but DB unavailable.
          if [ "$picks_code" -ne 200 ] && [ "$picks_code" -ne 503 ]; then
            echo "Unexpected response code from /api/picks"
            exit 1
          fi

      - name: Notify Slack on failure
        if: ${{ failure() && secrets.ALERT_SLACK_WEBHOOK_URL != '' }}
        env:
          ALERT_SLACK_WEBHOOK_URL: ${{ secrets.ALERT_SLACK_WEBHOOK_URL }}
        run: |
          set -e
          payload=$(cat <<'JSON'
          {
            "text": "Post Deploy Smoke Test failed for MWSportsMasters2026. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          JSON
          )
          curl -sS -X POST -H 'Content-type: application/json' --data "$payload" "$ALERT_SLACK_WEBHOOK_URL"

      - name: Notify email on failure
        if: ${{ failure() && secrets.ALERT_SMTP_SERVER != '' && secrets.ALERT_SMTP_USERNAME != '' && secrets.ALERT_SMTP_PASSWORD != '' && secrets.ALERT_EMAIL_TO != '' && secrets.ALERT_EMAIL_FROM != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.ALERT_SMTP_SERVER }}
          server_port: ${{ secrets.ALERT_SMTP_PORT || '587' }}
          secure: false
          username: ${{ secrets.ALERT_SMTP_USERNAME }}
          password: ${{ secrets.ALERT_SMTP_PASSWORD }}
          subject: "[MWSportsMasters2026] Post Deploy Smoke Test failed"
          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: ${{ secrets.ALERT_EMAIL_FROM }}
          body: "Workflow failed. Run details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
